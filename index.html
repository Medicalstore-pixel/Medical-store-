<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junaid Medical Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:linear-gradient(135deg,#eafcff,#f6fff9);
  color:#111;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  z-index:1000;
}

nav h2{color:#00a8a8;font-weight:700;}
nav a{margin-left:20px;text-decoration:none;color:#333;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
}

.hero h1{
  font-size:60px;
  background:linear-gradient(90deg,#00a8a8,#00c6a7);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:15px;
}

.hero p{
  opacity:0.7;
  margin-bottom:30px;
  font-size:18px;
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,#00a8a8,#00c6a7);
  color:white;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 15px 40px rgba(0,168,168,0.3);
}

/* FLOATING SHAPES */
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(0,168,168,0.1);
  animation:float 6s infinite ease-in-out;
}

.c1{width:200px;height:200px;top:10%;left:10%;}
.c2{width:150px;height:150px;bottom:10%;right:10%;}
.c3{width:100px;height:100px;top:50%;left:80%;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-25px);}
}

/* SECTION */
.section{
  padding:100px 8%;
  text-align:center;
}

.section h2{
  font-size:36px;
  margin-bottom:50px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-15px) scale(1.03);
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

/* OWNER */
.owner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:50px;
  padding:100px 8%;
}

.owner img{
  width:220px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

/* CONTACT */
.contact{
  padding:80px;
  text-align:center;
  background:linear-gradient(135deg,#00a8a8,#00c6a7);
  color:white;
}

/* MAP */
iframe{
  width:100%;
  height:320px;
  border:0;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#25D366;
  color:white;
  padding:18px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:38px;}
  .owner{flex-direction:column;}
}
</style>
</head>

<body>

<nav>
  <h2>Junaid Medical</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Junaid Medical Store</h1>
  <p>Premium Quality Medicines & Trusted Care</p>
  <a href="https://wa.me/923235957001">
    <button class="btn">Order Now</button>
  </a>
</section>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<!-- PRODUCTS -->
<section class="section">
  <h2>Our Products</h2>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1580281657527-47c67c53c0b6">
      <h3>Tablets</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1603398938378-e54eab446dde">
      <h3>Syrups</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1588776814546-ec7e0f0b76dc">
      <h3>Healthcare</h3>
    </div>
  </div>
</section>

<!-- OWNER -->
<section class="owner">
  <img src="owner.jpg">
  <div>
    <h2>Owner</h2>
    <p>Serving with trust and quality medicines.</p>
  </div>
</section>

<!-- CONTACT -->
<div class="contact">
  <h2>Contact</h2>
  <p>📞 0323 5957001</p>
  <p>📍 Near MCB Bank, Aloch Puran Nimklay</p>
</div>

<!-- MAP -->
<iframe src="https://www.google.com/maps?q=MCB+Bank+Aloch+Puran+Pakistan&output=embed"></iframe>

<a class="whatsapp" href="https://wa.me/923235957001">💬</a>

</body>
</html>
