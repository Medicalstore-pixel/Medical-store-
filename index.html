<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junaid Medical Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f8fafc;color:#0f172a;overflow-x:hidden;}

/* NAV */
nav{
position:fixed;width:100%;top:0;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:15px 8%;
display:flex;justify-content:space-between;
z-index:1000;
}
nav h2{color:#0ea5e9;font-weight:800;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#e0f2fe,#ffffff);
position:relative;
overflow:hidden;
}
.hero h1{
font-size:3.5rem;
font-weight:800;
}
.hero span{color:#0ea5e9;}
.hero p{margin-top:15px;color:#64748b;font-size:1.2rem;}

/* floating icons */
.icon{
position:absolute;
font-size:30px;
opacity:0.2;
animation:float 6s infinite ease-in-out;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* OWNER */
.owner{
padding:100px 8%;
display:flex;
justify-content:center;
}
.owner-card{
background:rgba(255,255,255,0.5);
backdrop-filter:blur(20px);
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
transition:0.4s;
}
.owner-card:hover{transform:translateY(-10px) scale(1.02);}
.owner-card img{
width:200px;height:200px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:5px solid white;
}

/* PRODUCTS */
.products{
padding:100px 8%;
background:#f1f5f9;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}
.card{
background:white;
border-radius:25px;
overflow:hidden;
transition:0.4s;
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}
.card:hover{
transform:translateY(-12px) scale(1.03);
}
.card img{width:100%;height:220px;object-fit:cover;}
.card h3{text-align:center;padding:20px;font-weight:600;}

/* FOOTER */
footer{
background:#0f172a;
color:white;
text-align:center;
padding:50px;
}

/* WHATSAPP */
.wa{
position:fixed;
bottom:25px;
right:25px;
background:#25d366;
width:65px;height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
animation:pulse 2s infinite;
}
@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.5);}
70%{box-shadow:0 0 0 15px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:2.5rem;}
}
</style>
</head>

<body>

<nav>
<h2>JUNAID PHARMACY</h2>
</nav>

<section class="hero">

<h1 data-aos="fade-up">Care, <span>Trust</span> & Health</h1>
<p data-aos="fade-up">Aloch Puran ki sabse best pharmacy</p>

<div class="icon" style="top:20%;left:10%;">💊</div>
<div class="icon" style="top:70%;left:80%;">🩺</div>
<div class="icon" style="top:40%;left:75%;">💉</div>

</section>

<section class="owner">
<div class="owner-card" data-aos="zoom-in">
<img src="owner.jpg">
<h2>Junaid</h2>
<p>Certified Pharmacist</p>
</div>
</section>

<section class="products">
<h2 style="text-align:center;margin-bottom:50px;">Our Products</h2>

<div class="grid">

<div class="card" data-aos="fade-up">
<img src="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae">
<h3>Tablets & Capsules</h3>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="100">
<img src="https://images.unsplash.com/photo-1550572017-ed20015ade66">
<h3>Syrups</h3>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="200">
<img src="https://images.unsplash.com/photo-1583946099379-f9c9cb8bc030">
<h3>Surgical Tools</h3>
</div>

</div>
</section>

<footer>
<p>📍 Aloch Puran | 📞 03235957001</p>
</footer>

<a href="https://wa.me/923235957001" class="wa">💬</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>AOS.init({duration:1200});</script>

</body>
</html>
